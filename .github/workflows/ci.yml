name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ruff lint
        run: ruff check src/ || true

      - name: Black format check
        run: black --check src/ || true

      - name: Pytest
        run: |
          if [ -d tests ]; then pytest tests/ -v; else echo "no tests directory"; fi

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remotion-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: remotion-service/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Build check
        run: npm run build || echo "build script not defined"
