name: Deploy Remotion Service

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remotion-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: remotion-service/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
